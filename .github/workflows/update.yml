name: Update Packages

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-packages
  cancel-in-progress: false

jobs:
  update:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Sync winget-pkgs fork
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          gh api repos/${{ github.repository_owner }}/winget-pkgs/merge-upstream `
            -X POST -f branch=master

      # ── NVPI Revamped ──────────────────────────────────────────────

      - name: Fetch NVPI-R release
        id: nvpir-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Authorization          = "Bearer $env:GH_TOKEN"
            Accept                 = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent'           = 'nvpi-r-auto-workflow'
          }
          # NVPI-R only ships stable releases — /releases/latest is correct here.
          $response = Invoke-RestMethod `
            -Uri 'https://api.github.com/repos/xHybred/NvidiaProfileInspectorRevamped/releases/latest' `
            -Headers $headers -MaximumRetryCount 3 -RetryIntervalSec 5
          if (-not $response -or -not $response.tag_name) {
            Write-Error 'Failed to fetch NVPI-R latest release or tag_name is null'
            exit 1
          }
          $version = $response.tag_name.TrimStart('v')
          $releaseDate = ([datetime]$response.published_at).ToString('yyyy-MM-dd')
          $asset = $response.assets | Where-Object { $_.name -eq 'NVPIRevamped.zip' } | Select-Object -First 1
          if (-not $asset) {
            $asset = $response.assets | Where-Object { $_.name -eq 'NVPI-R.zip' } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Error 'Neither NVPIRevamped.zip nor NVPI-R.zip asset found in latest release'
            exit 1
          }
          $url = $asset.browser_download_url
          Add-Content $env:GITHUB_OUTPUT "version=$version"
          Add-Content $env:GITHUB_OUTPUT "tag=$($response.tag_name)"
          Add-Content $env:GITHUB_OUTPUT "url=$url"
          Add-Content $env:GITHUB_OUTPUT "releasedate=$releaseDate"
          Write-Host "NVPI-R: tag=$($response.tag_name) version=$version date=$releaseDate"

      - name: Check NVPI-R version
        id: nvpir-check
        shell: pwsh
        run: |
          $current = if (Test-Path version.txt) { (Get-Content version.txt -Raw).Trim() } else { '' }
          $isManual = '${{ github.event_name }}' -eq 'workflow_dispatch'
          $newVersion = $current -ne '${{ steps.nvpir-release.outputs.version }}'
          Add-Content $env:GITHUB_OUTPUT "new-version=$($newVersion.ToString().ToLower())"
          if (-not $newVersion -and -not $isManual) {
            Write-Host 'NVPI-R already up to date'
            Add-Content $env:GITHUB_OUTPUT 'skip=true'
          } else {
            if ($isManual -and -not $newVersion) { Write-Host 'Manual dispatch - refreshing NVPI-R manifests (same version)' }
            elseif ($isManual) { Write-Host 'Manual dispatch - forcing NVPI-R update' }
            Write-Host "Updating NVPI-R from $current to ${{ steps.nvpir-release.outputs.version }}"
            Add-Content $env:GITHUB_OUTPUT 'skip=false'
          }

      - name: Download and hash NVPI-R
        if: steps.nvpir-check.outputs.skip != 'true'
        id: nvpir-hash
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tmp = Join-Path $env:RUNNER_TEMP 'nvpi-r.zip'
          Invoke-WebRequest -Uri '${{ steps.nvpir-release.outputs.url }}' -OutFile $tmp -UseBasicParsing -MaximumRetryCount 3 -RetryIntervalSec 5
          $sha256 = (Get-FileHash $tmp -Algorithm SHA256).Hash.ToLower()
          Add-Content $env:GITHUB_OUTPUT "sha256=$sha256"
          Remove-Item $tmp -Force

      - name: Update NVPI-R Scoop manifest
        if: steps.nvpir-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $m = Get-Content bucket/nvpi-r.json -Raw | ConvertFrom-Json
          $m.version = '${{ steps.nvpir-release.outputs.version }}'
          $m.url = '${{ steps.nvpir-release.outputs.url }}'
          $m.hash = '${{ steps.nvpir-hash.outputs.sha256 }}'
          $m | ConvertTo-Json -Depth 10 | Set-Content bucket/nvpi-r.json -NoNewline -Encoding utf8

      - name: Update NVPI-R Chocolatey nuspec
        if: steps.nvpir-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          [xml]$nuspec = Get-Content chocolatey/nvpi-r.nuspec
          $nuspec.package.metadata.version = '${{ steps.nvpir-release.outputs.version }}'
          $nuspec.package.metadata.releaseNotes = "https://github.com/xHybred/NvidiaProfileInspectorRevamped/releases/tag/${{ steps.nvpir-release.outputs.tag }}"
          $nuspec.Save((Resolve-Path chocolatey/nvpi-r.nuspec).Path)

      - name: Update NVPI-R install script
        if: steps.nvpir-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $content = Get-Content chocolatey/tools/chocolateyInstall.ps1 -Raw
          $content = $content -replace "(?<=url\s*=\s*')[^']*(?=')", '${{ steps.nvpir-release.outputs.url }}'
          $content = $content -replace "(?<=checksum\s*=\s*')[^']*(?=')", '${{ steps.nvpir-hash.outputs.sha256 }}'
          $content = $content.TrimEnd()
          Set-Content chocolatey/tools/chocolateyInstall.ps1 $content -NoNewline

      - name: Update NVPI-R WinGet manifests
        if: steps.nvpir-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $version = '${{ steps.nvpir-release.outputs.version }}'
          $tag = '${{ steps.nvpir-release.outputs.tag }}'
          $url = '${{ steps.nvpir-release.outputs.url }}'
          $sha256 = '${{ steps.nvpir-hash.outputs.sha256 }}'
          $releaseDate = '${{ steps.nvpir-release.outputs.releasedate }}'
          foreach ($file in Get-ChildItem winget/*.yaml) {
            $content = Get-Content $file.FullName -Raw
            $content = $content -replace '(?<=PackageVersion:\s+)\S+', $version
            if ($file.Name -like '*installer*') {
              $content = $content -replace '(?<=InstallerUrl:\s+)\S+', $url
              $content = $content -replace '(?<=InstallerSha256:\s+)\S+', $sha256.ToUpper()
              $content = $content -replace '(?<=ReleaseDate:\s+)\S+', $releaseDate
            }
            if ($file.Name -like '*locale*') {
              $content = $content -replace '(?<=ReleaseNotesUrl:\s+)\S+', "https://github.com/xHybred/NvidiaProfileInspectorRevamped/releases/tag/$tag"
            }
            Set-Content $file.FullName $content -NoNewline
          }

      - name: Pack NVPI-R Chocolatey package
        if: steps.nvpir-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          choco pack chocolatey/nvpi-r.nuspec --out .

      - name: Push NVPI-R to Chocolatey
        if: steps.nvpir-check.outputs.skip != 'true'
        continue-on-error: true
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $nupkg = (Get-Item 'nvpi-r.*.nupkg').FullName
          choco push $nupkg --source 'https://push.chocolatey.org' --api-key $env:CHOCO_API_KEY

      - name: Submit NVPI-R to WinGet
        if: steps.nvpir-check.outputs.skip != 'true' && (steps.nvpir-check.outputs.new-version == 'true' || github.event_name == 'workflow_dispatch')
        id: nvpir-winget
        continue-on-error: true
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $version = '${{ steps.nvpir-release.outputs.version }}'
          $headers = @{
            Authorization          = "Bearer $env:WINGET_TOKEN"
            Accept                 = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent'           = 'nvpi-r-auto-workflow'
          }
          # Guard 1: version folder already merged into winget-pkgs
          try {
            $null = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/x/xHybred/NVPIRevamped/$version" `
              -Headers $headers -MaximumRetryCount 2 -RetryIntervalSec 5
            Write-Host "NVPI-R v$version already merged in microsoft/winget-pkgs — skipping submission"
            exit 0
          } catch {
            $code = if ($_.Exception.Response) { [int]$_.Exception.Response.StatusCode } else { -1 }
            if ($code -ne 404) { Write-Warning "winget-pkgs contents check returned HTTP $code — proceeding anyway" }
          }
          # Guard 2: open PR already targeting this version
          # On manual dispatch: close existing PR so we can resubmit with fresh manifests.
          # On schedule: leave it open (avoids disturbing in-review PRs).
          try {
            $q = [Uri]::EscapeDataString("repo:microsoft/winget-pkgs is:pr is:open xHybred.NVPIRevamped $version")
            $search = Invoke-RestMethod -Uri "https://api.github.com/search/issues?q=$q" `
              -Headers $headers -MaximumRetryCount 2 -RetryIntervalSec 5
            if ($search.total_count -gt 0) {
              $prNumber = $search.items[0].number
              if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
                Write-Host "Manual dispatch: closing existing PR #$prNumber to resubmit fresh"
                try {
                  Invoke-RestMethod `
                    -Uri "https://api.github.com/repos/microsoft/winget-pkgs/pulls/$prNumber" `
                    -Method PATCH -Body '{"state":"closed"}' -ContentType 'application/json' `
                    -Headers $headers -MaximumRetryCount 2 -RetryIntervalSec 5 | Out-Null
                } catch {
                  Write-Warning "Failed to close PR #$prNumber: $($_.Exception.Message)"
                }
              } else {
                Write-Host "NVPI-R v$version already has open PR #$prNumber — skipping (use workflow_dispatch to force resubmit)"
                exit 0
              }
            }
          } catch {
            Write-Warning "PR search check failed: $($_.Exception.Message) — proceeding anyway"
          }
          if (-not (Test-Path wingetcreate.exe)) {
            Invoke-WebRequest -Uri 'https://aka.ms/wingetcreate/latest' -OutFile wingetcreate.exe -UseBasicParsing -MaximumRetryCount 3 -RetryIntervalSec 5
          }
          .\wingetcreate.exe submit --token $env:WINGET_TOKEN winget

      - name: Bump NVPI-R version file
        if: steps.nvpir-check.outputs.skip != 'true' && steps.nvpir-winget.outcome == 'success'
        shell: pwsh
        run: |
          Set-Content version.txt '${{ steps.nvpir-release.outputs.version }}'

      # ── NVIDIA Profile Inspector (Original) ────────────────────────

      - name: Fetch NPI release
        id: nvpi-release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $headers = @{
            Authorization          = "Bearer $env:GH_TOKEN"
            Accept                 = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent'           = 'nvpi-r-auto-workflow'
          }
          # Orbmu2k publishes the v3.x line as pre-release. /releases/latest excludes pre-releases,
          # so we fetch all recent releases and pick the most recent non-draft (any prerelease state).
          $releases = Invoke-RestMethod `
            -Uri 'https://api.github.com/repos/Orbmu2k/nvidiaProfileInspector/releases?per_page=10' `
            -Headers $headers -MaximumRetryCount 3 -RetryIntervalSec 5
          $candidates = @($releases | Where-Object { -not $_.draft })
          $release = $null
          foreach ($r in $candidates) {
            $hasAsset = ($r.assets | Where-Object { $_.name -eq 'nvidiaProfileInspector.zip' } | Select-Object -First 1)
            if ($hasAsset) { $release = $r; break }
          }
          if (-not $release -or -not $release.tag_name) {
            Write-Error 'No NPI release with nvidiaProfileInspector.zip asset found'
            exit 1
          }
          $version = $release.tag_name.TrimStart('v')
          $releaseDate = ([datetime]$release.published_at).ToString('yyyy-MM-dd')
          $asset = $release.assets | Where-Object { $_.name -eq 'nvidiaProfileInspector.zip' } | Select-Object -First 1
          $url = $asset.browser_download_url
          Add-Content $env:GITHUB_OUTPUT "version=$version"
          Add-Content $env:GITHUB_OUTPUT "tag=$($release.tag_name)"
          Add-Content $env:GITHUB_OUTPUT "url=$url"
          Add-Content $env:GITHUB_OUTPUT "releasedate=$releaseDate"
          Add-Content $env:GITHUB_OUTPUT "prerelease=$($release.prerelease.ToString().ToLower())"
          Write-Host "NPI: tag=$($release.tag_name) version=$version date=$releaseDate prerelease=$($release.prerelease)"

      - name: Check NPI version
        id: nvpi-check
        shell: pwsh
        run: |
          $current = if (Test-Path nvpi-version.txt) { (Get-Content nvpi-version.txt -Raw).Trim() } else { '' }
          $isManual = '${{ github.event_name }}' -eq 'workflow_dispatch'
          $newVersion = $current -ne '${{ steps.nvpi-release.outputs.version }}'
          Add-Content $env:GITHUB_OUTPUT "new-version=$($newVersion.ToString().ToLower())"
          if (-not $newVersion -and -not $isManual) {
            Write-Host 'NPI already up to date'
            Add-Content $env:GITHUB_OUTPUT 'skip=true'
          } else {
            if ($isManual -and -not $newVersion) { Write-Host 'Manual dispatch - refreshing NPI manifests (same version)' }
            elseif ($isManual) { Write-Host 'Manual dispatch - forcing NPI update' }
            Write-Host "Updating NPI from $current to ${{ steps.nvpi-release.outputs.version }}"
            Add-Content $env:GITHUB_OUTPUT 'skip=false'
          }

      - name: Download and hash NPI
        if: steps.nvpi-check.outputs.skip != 'true'
        id: nvpi-hash
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $tmp = Join-Path $env:RUNNER_TEMP 'nvpi.zip'
          Invoke-WebRequest -Uri '${{ steps.nvpi-release.outputs.url }}' -OutFile $tmp -UseBasicParsing -MaximumRetryCount 3 -RetryIntervalSec 5
          $sha256 = (Get-FileHash $tmp -Algorithm SHA256).Hash.ToLower()
          Add-Content $env:GITHUB_OUTPUT "sha256=$sha256"
          Remove-Item $tmp -Force

      - name: Update NPI Scoop manifest
        if: steps.nvpi-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $m = Get-Content bucket/nvpi.json -Raw | ConvertFrom-Json
          $m.version = '${{ steps.nvpi-release.outputs.version }}'
          $m.url = '${{ steps.nvpi-release.outputs.url }}'
          $m.hash = '${{ steps.nvpi-hash.outputs.sha256 }}'
          $m | ConvertTo-Json -Depth 10 | Set-Content bucket/nvpi.json -NoNewline -Encoding utf8

      - name: Update NPI Chocolatey nuspec
        if: steps.nvpi-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          [xml]$nuspec = Get-Content chocolatey-nvpi/nvpi.nuspec
          $nuspec.package.metadata.version = '${{ steps.nvpi-release.outputs.version }}'
          $nuspec.package.metadata.releaseNotes = "https://github.com/Orbmu2k/nvidiaProfileInspector/releases/tag/${{ steps.nvpi-release.outputs.tag }}"
          $nuspec.Save((Resolve-Path chocolatey-nvpi/nvpi.nuspec).Path)

      - name: Update NPI install script
        if: steps.nvpi-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $content = Get-Content chocolatey-nvpi/tools/chocolateyInstall.ps1 -Raw
          $content = $content -replace "(?<=url\s*=\s*')[^']*(?=')", '${{ steps.nvpi-release.outputs.url }}'
          $content = $content -replace "(?<=checksum\s*=\s*')[^']*(?=')", '${{ steps.nvpi-hash.outputs.sha256 }}'
          $content = $content.TrimEnd()
          Set-Content chocolatey-nvpi/tools/chocolateyInstall.ps1 $content -NoNewline

      - name: Update NPI WinGet manifests
        if: steps.nvpi-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          $version = '${{ steps.nvpi-release.outputs.version }}'
          $tag = '${{ steps.nvpi-release.outputs.tag }}'
          $url = '${{ steps.nvpi-release.outputs.url }}'
          $sha256 = '${{ steps.nvpi-hash.outputs.sha256 }}'
          $releaseDate = '${{ steps.nvpi-release.outputs.releasedate }}'
          foreach ($file in Get-ChildItem winget-nvpi/*.yaml) {
            $content = Get-Content $file.FullName -Raw
            $content = $content -replace '(?<=PackageVersion:\s+)\S+', $version
            if ($file.Name -like '*installer*') {
              $content = $content -replace '(?<=InstallerUrl:\s+)\S+', $url
              $content = $content -replace '(?<=InstallerSha256:\s+)\S+', $sha256.ToUpper()
              $content = $content -replace '(?<=ReleaseDate:\s+)\S+', $releaseDate
            }
            if ($file.Name -like '*locale*') {
              $content = $content -replace '(?<=ReleaseNotesUrl:\s+)\S+', "https://github.com/Orbmu2k/nvidiaProfileInspector/releases/tag/$tag"
            }
            Set-Content $file.FullName $content -NoNewline
          }

      - name: Pack NPI Chocolatey package
        if: steps.nvpi-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          choco pack chocolatey-nvpi/nvpi.nuspec --out .

      - name: Push NPI to Chocolatey
        if: steps.nvpi-check.outputs.skip != 'true'
        continue-on-error: true
        shell: pwsh
        env:
          CHOCO_API_KEY: ${{ secrets.CHOCO_API_KEY }}
        run: |
          $nupkg = (Get-Item 'nvpi.*.nupkg').FullName
          choco push $nupkg --source 'https://push.chocolatey.org' --api-key $env:CHOCO_API_KEY

      - name: Submit NPI to WinGet
        if: steps.nvpi-check.outputs.skip != 'true' && (steps.nvpi-check.outputs.new-version == 'true' || github.event_name == 'workflow_dispatch')
        id: nvpi-winget
        continue-on-error: true
        shell: pwsh
        env:
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
        run: |
          $version = '${{ steps.nvpi-release.outputs.version }}'
          $headers = @{
            Authorization          = "Bearer $env:WINGET_TOKEN"
            Accept                 = 'application/vnd.github+json'
            'X-GitHub-Api-Version' = '2022-11-28'
            'User-Agent'           = 'nvpi-r-auto-workflow'
          }
          # Guard 1: version folder already merged into winget-pkgs
          try {
            $null = Invoke-RestMethod `
              -Uri "https://api.github.com/repos/microsoft/winget-pkgs/contents/manifests/o/Orbmu2k/nvidiaProfileInspector/$version" `
              -Headers $headers -MaximumRetryCount 2 -RetryIntervalSec 5
            Write-Host "NPI v$version already merged in microsoft/winget-pkgs — skipping submission"
            exit 0
          } catch {
            $code = if ($_.Exception.Response) { [int]$_.Exception.Response.StatusCode } else { -1 }
            if ($code -ne 404) { Write-Warning "winget-pkgs contents check returned HTTP $code — proceeding anyway" }
          }
          # Guard 2: open PR already targeting this version
          # On manual dispatch: close existing PR so we can resubmit with fresh manifests.
          # On schedule: leave it open (avoids disturbing in-review PRs).
          try {
            $q = [Uri]::EscapeDataString("repo:microsoft/winget-pkgs is:pr is:open Orbmu2k.nvidiaProfileInspector $version")
            $search = Invoke-RestMethod -Uri "https://api.github.com/search/issues?q=$q" `
              -Headers $headers -MaximumRetryCount 2 -RetryIntervalSec 5
            if ($search.total_count -gt 0) {
              $prNumber = $search.items[0].number
              if ('${{ github.event_name }}' -eq 'workflow_dispatch') {
                Write-Host "Manual dispatch: closing existing PR #$prNumber to resubmit fresh"
                try {
                  Invoke-RestMethod `
                    -Uri "https://api.github.com/repos/microsoft/winget-pkgs/pulls/$prNumber" `
                    -Method PATCH -Body '{"state":"closed"}' -ContentType 'application/json' `
                    -Headers $headers -MaximumRetryCount 2 -RetryIntervalSec 5 | Out-Null
                } catch {
                  Write-Warning "Failed to close PR #$prNumber: $($_.Exception.Message)"
                }
              } else {
                Write-Host "NPI v$version already has open PR #$prNumber — skipping (use workflow_dispatch to force resubmit)"
                exit 0
              }
            }
          } catch {
            Write-Warning "PR search check failed: $($_.Exception.Message) — proceeding anyway"
          }
          if (-not (Test-Path wingetcreate.exe)) {
            Invoke-WebRequest -Uri 'https://aka.ms/wingetcreate/latest' -OutFile wingetcreate.exe -UseBasicParsing -MaximumRetryCount 3 -RetryIntervalSec 5
          }
          .\wingetcreate.exe submit --token $env:WINGET_TOKEN winget-nvpi

      - name: Bump NPI version file
        if: steps.nvpi-check.outputs.skip != 'true' && steps.nvpi-winget.outcome == 'success'
        shell: pwsh
        run: |
          Set-Content nvpi-version.txt '${{ steps.nvpi-release.outputs.version }}'

      # ── Commit ──────────────────────────────────────────────────────

      - name: Commit and push
        if: steps.nvpir-check.outputs.skip != 'true' || steps.nvpi-check.outputs.skip != 'true'
        shell: pwsh
        run: |
          git config user.name 'AmirulAndalib'
          git config user.email 'AmirulAndalib@users.noreply.github.com'
          git add bucket/ chocolatey/ chocolatey-nvpi/ winget/ winget-nvpi/ version.txt nvpi-version.txt
          $status = git status --porcelain
          if (-not $status) {
            Write-Host 'No changes to commit'
            exit 0
          }
          $nvpirUpdated = '${{ steps.nvpir-check.outputs.skip }}' -ne 'true'
          $nvpiUpdated = '${{ steps.nvpi-check.outputs.skip }}' -ne 'true'
          $msg = 'chore: bump'
          if ($nvpirUpdated) { $msg += " nvpi-r to v${{ steps.nvpir-release.outputs.version }}" }
          if ($nvpirUpdated -and $nvpiUpdated) { $msg += ',' }
          if ($nvpiUpdated) { $msg += " nvpi to v${{ steps.nvpi-release.outputs.version }}" }
          if (-not $nvpirUpdated -and -not $nvpiUpdated) { $msg = 'chore: update package manifests' }
          $msg += "`n`nCo-authored-by: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>"
          git commit -m "$msg"
          git push
